<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page noire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button type="button" class="btn-retour" id="btn-retour" title="Revenir à l'identité" aria-label="Revenir à l'identité">
    <svg class="btn-retour-fleche" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </button>

  <div id="vue-identite" class="vue">
    <section class="identite">
      <h2>Identité</h2>
      <div class="champ">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" placeholder="Ton prénom (met pseudo si tu veut pas)" />
      </div>
      <div class="champ">
        <label for="age">Âge</label>
        <input type="number" id="age" name="age" placeholder="Ton âge" min="1" max="150" />
      </div>
      <div class="champ">
        <label for="sexe-pronom">Sexe / Pronom</label>
        <input type="text" id="sexe-pronom" name="sexe_pronom" placeholder="Homme / Femme / Autre" />
      </div>
      <div class="champ">
        <label for="activite">Activité</label>
        <input type="text" id="activite" name="activite" placeholder="Ce que tu fait dans la vie (ex: Basketball, Ecriture)" />
      <div class="champ">
        <label for="etudes">Études</label>
        <input type="text" id="etudes" name="etudes" placeholder="Tes études" />
      </div>
      <div class="champ">
        <label for="origines">Origines</label>
        <textarea id="origines" name="origines" placeholder="Tes origines"></textarea>
      </div>
      <button type="button" class="btn-confirmer" data-vue="identite">Confirmer</button>
    </section>
  </div>

  <div id="vue-personnalite" class="vue vue-cachee">
    <section class="personnalite">
      <h2>Personnalité</h2>
      <div class="champ">
        <label for="qualites">Qualités</label>
        <textarea id="qualites" name="qualites" placeholder="Tes qualités"></textarea>
      </div>
      <div class="champ">
        <label for="defauts">Défauts</label>
        <textarea id="defauts" name="defauts" placeholder="Tes défauts (soit honnête, dit tous)"></textarea>
      </div>
      <div class="champ">
        <label for="passions">Passions</label>
        <textarea id="passions" name="passions" placeholder="Tes passions (Pas un truc comme Voyager ou autre chose générique, une vraie passion)"></textarea>
      </div>
      <button type="button" class="btn-confirmer" data-vue="personnalite">Confirmer</button>
    </section>
  </div>

  <div id="vue-objectifs" class="vue vue-cachee">
    <section class="objectifs">
      <h2>Objectifs</h2>
      <div class="champ">
        <label for="objectif-mois">Sur un mois</label>
        <textarea id="objectif-mois" name="objectif_mois" placeholder="Objectifs sur un mois"></textarea>
      </div>
      <div class="champ">
        <label for="objectif-an">Sur un an</label>
        <textarea id="objectif-an" name="objectif_an" placeholder="Objectifs sur un an"></textarea>
      </div>
      <div class="champ">
        <label for="objectif-vie">Dans la vie</label>
        <textarea id="objectif-vie" name="objectif_vie" placeholder="Objectifs dans la vie"></textarea>
      </div>
      <div class="champ">
        <label for="objectif-autres">Autres</label>
        <textarea id="objectif-autres" name="objectif_autres" placeholder="Autres objectifs"></textarea>
      </div>
      <button type="button" class="btn-confirmer" data-vue="objectifs">Confirmer</button>
    </section>
  </div>

  <div id="vue-resultat" class="vue vue-cachee">
    <div class="resultat-contenu">
      <label class="label-copier" id="label-copier" title="Cliquer pour copier"></label>
      <span class="label-copier-feedback" id="label-copier-feedback" aria-live="polite">Copié !</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
