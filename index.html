<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archi-Lourd Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      box-sizing: border-box;
    }
    .page-accueil {
      height: 100vh;
      min-height: 100%;
      box-sizing: border-box;
      background: #000;
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .cartes {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .carte {
      display: block;
      width: 280px;
      max-width: 100%;
      padding: 2rem 1.5rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.1rem;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .carte:hover {
      background: #252525;
      border-color: #555;
    }
    .btn-accueil {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      color: #888;
      text-decoration: none;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-accueil svg {
      width: 1.1rem;
      height: 1.1rem;
      flex-shrink: 0;
    }
    .btn-accueil:hover {
      color: #e0e0e0;
      background: #252525;
      border-color: #555;
    }
  </style>
</head>
<body class="page-accueil">
  <a href="index.html" class="btn-accueil" aria-label="Accueil">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Accueil</span>
  </a>
  <div class="cartes">
    <a href="formulaire.html" class="carte">Générateur de Présentation</a>
    <a href="pompes.html" class="carte">Pompes journalières</a>
  </div>
</body>
</html>
